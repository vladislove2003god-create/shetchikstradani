<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Счетчик</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
font-family:Arial;
color:white;
}

.box{
text-align:center;
}

h1{
font-size:40px;
margin-bottom:30px;
}

.main-btn{
width:240px;
height:240px;
border-radius:50%;
border:none;
font-size:24px;
background:red;
color:white;
cursor:pointer;
transition:0.2s;
padding:20px;
}

.main-btn:active{
transform:scale(0.95);
}

.count{
margin-top:25px;
font-size:35px;
}

.reset-btn{
margin-top:25px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
background:#444;
color:white;
transition:0.2s;
}

.reset-btn:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="box">

<h1>ПОЧЕМУ СТРАДАЕТ ВОДИТЕЛЬ?</h1>

<button class="main-btn" onclick="addClick()">
БЕЗ КОМПЕНСАЦИИ
</button>

<div class="count">
Страданий: <span id="c">0</span>
</div>

<button class="reset-btn" onclick="resetCounter()">
СБРОСИТЬ
</button>

</div>

<script>

// загружаем сохранённые данные
let clicks = localStorage.getItem("clicks");

if(clicks === null){
  clicks = 0;
}

document.getElementById("c").innerText = clicks;

// добавить клик
function addClick(){
  clicks++;

  document.getElementById("c").innerText = clicks;

  localStorage.setItem("clicks", clicks);
}

// сброс
function resetCounter(){
  clicks = 0;

  document.getElementById("c").innerText = clicks;

  localStorage.setItem("clicks", clicks);
}

</script>

</body>
</html>
