<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Счетчик</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
font-family:Arial;
color:white;
}

.box{
text-align:center;
}

h1{
font-size:40px;
margin-bottom:30px;
}

button{
width:240px;
height:240px;
border-radius:50%;
border:none;
font-size:24px;
background:red;
color:white;
cursor:pointer;
transition:0.2s;
padding:20px;
}

button:active{
transform:scale(0.95);
}

.count{
margin-top:25px;
font-size:35px;
}
</style>
</head>

<body>

<div class="box">

<h1>ПОЧЕМУ СТРАДАЕТ ВОДИТЕЛЬ?</h1>

<button onclick="addClick()">
БЕЗ КОМПЕНСАЦИИ
</button>

<div class="count">
Страданий: <span id="c">0</span>
</div>

</div>

<script>

// загружаем сохранённое число
let clicks = localStorage.getItem("clicks");

if(clicks === null){
  clicks = 0;
}

document.getElementById("c").innerText = clicks;

// функция клика
function addClick(){
  clicks++;
  
  document.getElementById("c").innerText = clicks;

  // сохраняем
  localStorage.setItem("clicks", clicks);
}

</script>

</body>
</html>
